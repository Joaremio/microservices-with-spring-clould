spring:
  application:
    name: book-service
  datasource:
    url: jdbc:postgresql://localhost:5432/book_service
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 1234567
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
      show-sql: false
      open-in-view: false
  zipkin:
    base-url: http://localhost:9411
management:
  tracing:
    sampling:
      probability: 1.0
server:
  port: 8100
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
resilience4j:
  bulkhead:
    instances:
      default:
        max-concurrent-calls: 10
      foo-bar:
        max-concurrent-calls: 20
  retry:
    instances:
      foo-bar:
        max-attempts: 7
        wait-duration: 1s
  ratelimiter:
    instances:
      default:
        limit-for-period: 2
        limit-refresh-period: 10s