spring:
  application:
    name: api-gateway
  zipkin:
    base-url: http://localhost:9411
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: book-service
              uri: lb://book-service
              predicates:
                - Path=/book-service/**
              filters:
                - StripPrefix=1
            - id: exchange-service
              uri: lb://exchange-service
              predicates:
                - Path=/exchange-service/**
              filters:
                - StripPrefix=1

server:
  port: 8765
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
management:
  tracing:
    sampling:
      probability: 1.0