spring:
  application:
    name: exchange-service

  datasource:
    url: jdbc:postgresql://localhost:5432/exchange_service
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 1234567

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
#  zipkin:
#    base-url: http://localhost:9411
management:
  tracing:
    sampling:
      probability: 1.0
  endpoint:
    health:
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
server:
  port: 8000
