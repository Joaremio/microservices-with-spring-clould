name: Docker Image CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '21'

      - name: Build Eureka Naming Server Docker Image
        working-directory: ./naming-server
        run: mvn spring-boot:build-image -DskipTests

      - name: Build API Gateway Docker Image
        working-directory: ./api-gateway
        run: mvn clean package -DskipTests

      - name: Build Exchange Microservice Docker Image
        working-directory: ./exchange-service
        run: mvn clean

      - name: Build Book Microservice Docker Image
        working-directory: ./book-service
        run: mvn clean package

      - name: Docker Compose Build
        working-directory: .
        run: docker compose build

      - name: Tag Docker Images
        run:
          tag ${{ secrets.DOCKER_USERNAME }}/naming-server:0.0.1-SNAPSHOT ${{ secrets.DOCKER_USERNAME }}/naming-server:latest
          tag ${{ secrets.DOCKER_USERNAME }}/naming-server:0.0.1-SNAPSHOT ${{ secrets.DOCKER_USERNAME }}/naming-server:${{github.RUN_ID}}
          tag ${{ secrets.DOCKER_USERNAME }}/api-gateway:0.0.1-SNAPSHOT ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
          tag ${{ secrets.DOCKER_USERNAME }}/api-gateway:0.0.1-SNAPSHOT ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{github.RUN_ID}}
          tag ${{ secrets.DOCKER_USERNAME }}/book-service:latest ${{ secrets.DOCKER_USERNAME }}/book-service:${{github.RUN_ID}}
          tag ${{ secrets.DOCKER_USERNAME }}/exchange-service:latest ${{ secrets.DOCKER_USERNAME }}/exchange-service:${{github.RUN_ID}}


      - name: Push Docker Images to Docker Hub
        run:
          docker push ${{ secrets.DOCKER_USERNAME }}/naming-server:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/naming-server:${{github.RUN_ID}}
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{github.RUN_ID}}
          docker push ${{ secrets.DOCKER_USERNAME }}/book-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/book-service:${{github.RUN_ID}}
          docker push ${{ secrets.DOCKER_USERNAME }}/exchange-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/exchange-service:${{github.RUN_ID}}

